name: Calendar integration CI

on:
  push:
    paths:
      - 'backend/calendar_integration/**'
  pull_request:
    paths:
      - 'backend/calendar_integration/**'

jobs:
  test-calendar-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install -r backend/requirements.txt
      - name: Prepare service account
        env:
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: |
          if [ -n "${GCP_SA_JSON}" ]; then
            echo "$GCP_SA_JSON" > sa.json
            export GOOGLE_SERVICE_ACCOUNT_FILE=$PWD/sa.json
          fi
      - name: Run calendar_integration tests
        run: |
          python backend/manage.py test calendar_integration
name: Calendar integration CI

on:
  push:
    paths:
      - 'backend/calendar_integration/**'
      - '.github/workflows/calendar-integration.yml'
  pull_request:
    paths:
      - 'backend/calendar_integration/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r backend/requirements.txt
      - name: Lint calendar_integration
        run: |
          ruff check backend/calendar_integration
      - name: Run calendar_integration tests
        env:
          DJANGO_SETTINGS_MODULE: backend.settings
        run: |
          cd backend
          python manage.py test calendar_integration

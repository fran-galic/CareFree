<!DOCTYPE html>
<html lang="hr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title|default:"CareFree" }}</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #fff;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
        'Helvetica Neue', Arial, sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="padding: 28px 12px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="max-width: 600px; width: 100%"
          >
            <tr>
              <td
                style="
                  padding: 18px 24px;
                  background: linear-gradient(135deg, #66c2b5 0%, #f2a45b 100%);
                  border-radius: 22px 22px 0 0;
                "
              >
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="vertical-align: middle">
                      {% if logo_url %}
                      <img
                        src="{{ logo_url }}"
                        alt="CareFree logo"
                        width="44"
                        height="44"
                        style="display: block; width: 44px; height: 44px; border-radius: 12px; background: #ffffff"
                      />
                      {% endif %}
                    </td>
                    <td style="padding-left: 14px; vertical-align: middle">
                      <p style="margin: 0 0 4px; font-size: 12px; letter-spacing: 0.12em; color: rgba(255,255,255,0.86); text-transform: uppercase;">
                        CareFree
                      </p>
                      <h1 style="margin: 0; font-size: 22px; color: #ffffff">
                        {{ title|default:"CareFree" }}
                      </h1>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td
                style="
                  background: #ffffff;
                  border-left: 1px solid #e6edf3;
                  border-right: 1px solid #e6edf3;
                  padding: 24px 22px 18px;
                "
              >
                <p style="margin: 0 0 12px; font-size: 15px; color: #0f172a">
                  Poštovani/na {{ recipient_name|default:"korisniče" }},
                </p>
                <p
                  style="
                    margin: 0 0 18px;
                    font-size: 14px;
                    color: #334155;
                    line-height: 1.6;
                  "
                >
                  {{ message }}
                </p>
              </td>
            </tr>

            <tr>
              <td
                style="
                  background: #ffffff;
                  border-left: 1px solid #e6edf3;
                  border-right: 1px solid #e6edf3;
                  padding: 0 22px 18px;
                "
              >
                {% if hero_image_url %}
                <img
                  src="{{ hero_image_url }}"
                  alt="CareFree ilustracija"
                  style="display: block; width: 100%; max-width: 556px; margin: 0 auto; border-radius: 16px"
                />
                {% endif %}
              </td>
            </tr>

            <tr>
              <td
                style="
                  padding: 0 24px 18px;
                  color: #94a3b8;
                  font-size: 11px;
                  background: #ffffff;
                  border: 1px solid #e6edf3;
                  border-top: none;
                  border-radius: 0 0 22px 22px;
                "
              >
                <p style="margin: 0">CareFree — Simple, private support</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

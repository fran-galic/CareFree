<!DOCTYPE html>
<html lang="hr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title|default:"CareFree" }}</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #fff;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
        'Helvetica Neue', Arial, sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="padding: 28px 12px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="max-width: 600px; width: 100%"
          >
            <tr>
              <td style="padding: 18px 24px 8px; text-align: left">
                <h1 style="margin: 0; font-size: 18px; color: #0b1220">
                  CareFree
                </h1>
              </td>
            </tr>

            <tr>
              <td
                style="
                  background: #f8fafc;
                  border: 1px solid #e6edf3;
                  border-radius: 10px;
                  padding: 22px 20px;
                "
              >
                <p style="margin: 0 0 12px; font-size: 15px; color: #0f172a">
                  Poštovani/na {{ recipient_name|default:"korisniče" }},
                </p>
                <p
                  style="
                    margin: 0 0 18px;
                    font-size: 14px;
                    color: #334155;
                    line-height: 1.5;
                  "
                >
                  {{ message }}
                </p>
              </td>
            </tr>

            <tr>
              <td
                style="padding: 6px 24px 18px; color: #94a3b8; font-size: 11px"
              >
                <p style="margin: 0">CareFree — Simple, private support</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
